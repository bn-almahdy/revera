<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netzero - Planting a better future</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fbf8;
            --primary-green: #a3e635;
            --primary-green-hover: #84cc16;
            --dark-green: #064e3b;
            --text-main: #1f2937;
            --text-light: #6b7280;
            --nav-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.3);
            --shadow-sm: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            overflow-x: hidden;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        nav {
            position: fixed;
            top: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1200px;
            border-radius: 100px;
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--dark-green);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-dot {
            width: 12px;
            height: 12px;
            background: var(--primary-green);
            border-radius: 50%;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .nav-links a {
            text-decoration: none;
            color: inherit;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--dark-green);
        }

        .btn-outline {
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            border: 1.5px solid var(--dark-green);
            font-weight: 600;
            color: var(--dark-green);
            font-size: 0.9rem;
            cursor: pointer;
            background: transparent;
            transition: all 0.3s;
        }

        .btn-outline:hover {
            background: rgba(6, 78, 59, 0.05);
        }

        main {
            padding-top: 8rem;
        }

        .hero-content {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInUp 0.8s ease forwards;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4.2rem);
            font-weight: 700;
            color: var(--dark-green);
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        .btn-primary {
            background: var(--primary-green);
            color: var(--dark-green);
            padding: 1.1rem 2.8rem;
            border-radius: 100px;
            font-size: 1.05rem;
            font-weight: 700;
            box-shadow: 0 10px 20px -5px rgba(163, 230, 53, 0.4);
            cursor: pointer;
            border: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 30px -5px rgba(163, 230, 53, 0.6);
        }

        .visual-area {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            animation: fadeInUp 0.8s ease forwards 0.2s;
            opacity: 0;
        }

        .main-img-container {
            width: 100%;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 50px -10px rgba(0,0,0,0.1);
        }

        .main-img {
            width: 100%;
            height: auto;
            display: block;
            transform: scale(1.02);
        }

        .floating-card {
            position: absolute;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 0.75rem 1rem;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            z-index: 10;
            box-shadow: var(--shadow-md);
            min-width: 210px;
            animation: float 4s ease-in-out infinite;
        }

        .card-icon {
            width: 38px;
            height: 38px;
            background: rgba(163, 230, 53, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark-green);
        }

        .stats-side {
            position: absolute;
            font-size: 0.85rem;
            color: var(--text-light);
            font-weight: 500;
            opacity: 0.6;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .bg-glow {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100vh;
            background: radial-gradient(circle at 50% 0%, rgba(163, 230, 53, 0.12) 0%, transparent 65%);
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <nav>
        <div class="logo">
            <div class="logo-dot"></div>
            netzero
        </div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About Us</a>
            <a href="#">Technology</a>
            <a href="#">Projects</a>
        </div>
        <button class="btn-outline">Get Started</button>
    </nav>

    <main class="container">
        <div class="hero-content">
            <h1>Planting a better future</h1>
            <a href="#" class="btn-primary">Get Started</a>
        </div>

        <div class="visual-area">
            <div class="main-img-container">
                <img src="./public/hero.png" alt="Eco City" class="main-img">
            </div>

            <!-- Floating Cards -->
            <div class="floating-card" style="top: 8%; left: -6%;">
                <div class="card-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2v20M2 12h20"/></svg>
                </div>
                <div>
                    <p style="font-size: 0.7rem; color: var(--text-light)">Carbon Removal Rate</p>
                    <p style="font-size: 0.95rem; font-weight: 700; color: var(--dark-green)">2.3 tCO2/year</p>
                </div>
            </div>

            <div class="floating-card" style="top: 18%; right: -6%; animation-delay: 1s;">
                <div class="card-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m8 17 4 4 4-4"/></svg>
                </div>
                <div>
                    <p style="font-size: 0.7rem; color: var(--text-light)">Air Quality Improved</p>
                    <p style="font-size: 0.95rem; font-weight: 700; color: var(--dark-green)">6 g/year</p>
                </div>
            </div>

            <!-- Labels -->
            <div class="stats-side" style="left: -12%; bottom: 25%; transform: rotate(-30deg);">15.6 tons of carbon removed</div>
            <div class="stats-side" style="right: -12%; bottom: 35%; transform: rotate(30deg);">1,404,953 trees planted</div>
        </div>
    </main>
</body>
</html>
